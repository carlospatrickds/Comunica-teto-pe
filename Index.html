<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunica Teto PE | Revista Digital</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      padding: 16px;
    }
    #flipbook { box-shadow: 0 12px 40px rgba(0,0,0,0.8); }
    .status { color: #888; margin-bottom: 12px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="status">⏳ Carregando...</div>
  <div id="flipbook"></div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
  <script>
    // Lista MANUAL das páginas na ordem correta
    const paginas = [
      "3_20260427_003742_0000.jpg",
      "Páginas_20260427_003742_0001.jpg",
      "Matéria 2_20260427_003742_0005.jpg",
      "Matéria 1 capa_20260427_003742_0007.jpg",
      "Matéria 4 capa_20260427_003742_0009.jpg",
      "13_20260427_003742_0010.jpg",
      "14_20260427_003742_0011.jpg",
      "16_20260427_003742_0013.jpg",
      "17_20260427_003742_0014.jpg",
      "Matéria 5 capa_20260427_003742_0015.jpg",
      "Back Cover_20260427_003742_0017.jpg",
      "22_20260427_003742_0019.jpg",
      "23_20260427_003742_0020.jpg"
    ];

    const pageFlip = new StPageFlip(document.getElementById('flipbook'), {
      width: 420, height: 594, size: 'stretch',
      showCover: true, mobileScrollSupport: false
    });

    pageFlip.loadFromImages(paginas).then(() => {
      document.querySelector('.status').textContent = '✅ Pronto!';
    });
  </script>
</body>
</html>
